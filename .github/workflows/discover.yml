name: Discover Osho Pages

on:
  schedule:
    - cron: '17 3 * * 1'   # Mondays only, 08:47 IST (was daily — discovery is slow-changing)
  workflow_dispatch:        # manual "Run workflow" button

permissions:
  contents: write

jobs:
  discover:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run discovery
        env:
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python -u discover.py

      - name: Commit results (commit first, then pull --rebase, retry)
        run: |
          git config user.name "discover-bot"
          git config user.email "bot@oshocamps.com"
          git add candidates.json discover_state.json
          if git diff --cached --quiet; then
            echo "Nothing new today."
            exit 0
          fi
          git commit -m "discover: candidates $(date -u +%F) [skip netlify]"
          for i in 1 2 3 4 5; do
            git pull --rebase origin main && git push origin main && exit 0
            echo "Push attempt $i failed, retrying..."
            sleep 6
          done
          exit 1
