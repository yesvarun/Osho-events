name: Refresh Osho events

on:
  # Auto-schedule is OFF to protect your Apify credit — runs ONLY when you click
  # "Run workflow". To re-enable 6-hourly auto-runs, uncomment the two lines below:
  # schedule:
  #   - cron: "0 */6 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run scraper
        env:
          APIFY_TOKEN: ${{ secrets.APIFY_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TEST_MODE: ${{ vars.TEST_MODE }}
        run: python scraper.py

      - name: Commit updated data
        run: |
          git config user.name  "events-bot"
          git config user.email "bot@users.noreply.github.com"
          git add events.json
          git diff --staged --quiet && echo "no changes — nothing to commit" && exit 0
          git commit -m "refresh: $(date -u +'%Y-%m-%d %H:%M UTC')"
          git pull --rebase -X ours origin main || true
          git push
