# Place this file at:  .github/workflows/refresh.yml
# Runs the scraper automatically once every 24 hours, AND whenever you click
# "Run workflow" in the Actions tab. Commits the fresh events.json so your
# raw.githubusercontent.com URL always serves the latest data.

name: Refresh Osho events

on:
  # Auto-schedule: runs once every 24 hours at 04:30 UTC (10:00 AM India time).
  schedule:
    - cron: "30 4 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run scraper
        env:
          APIFY_TOKEN: ${{ secrets.APIFY_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          UNSPLASH_ACCESS_KEY: ${{ secrets.UNSPLASH_ACCESS_KEY }}
          IG_SESSION_COOKIE: ${{ secrets.IG_SESSION_COOKIE }}
          TEST_MODE: ${{ vars.TEST_MODE }}
        run: python scraper.py

      - name: Commit updated data
        run: |
          git config user.name  "events-bot"
          git config user.email "bot@users.noreply.github.com"
          git add -A
          git diff --staged --quiet && echo "no changes — nothing to commit" && exit 0
          git commit -m "refresh: $(date -u +'%Y-%m-%d %H:%M UTC')"
          git pull --rebase -X ours origin main || true
          git push
