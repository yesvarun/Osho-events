# Place this file at:  .github/workflows/refresh.yml
# Runs the scraper once every 24 hours AND on manual "Run workflow".
# Commits events.json AND all cache files (feed_cache/, card_images/) so the
# flyer cache, Unsplash cache, and Apify day-cache persist between runs.

name: Refresh Osho events

on:
  schedule:
    - cron: "30 4 * * *"      # 04:30 UTC = 10:00 AM India
  workflow_dispatch: {}

permissions:
  contents: write              # needed so the job can commit results back

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run scraper
        env:
          APIFY_TOKEN: ${{ secrets.APIFY_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          UNSPLASH_ACCESS_KEY: ${{ secrets.UNSPLASH_ACCESS_KEY }}
          IG_SESSION_COOKIE: ${{ secrets.IG_SESSION_COOKIE }}
          TEST_MODE: ${{ vars.TEST_MODE }}
        run: python scraper.py

      - name: Show what the cache looks like (debug)
        run: |
          echo "=== feed_cache/ contents ==="
          ls -la feed_cache/ || echo "feed_cache/ does NOT exist"
          echo "=== flyer_cache.json size ==="
          wc -c feed_cache/flyer_cache.json 2>/dev/null || echo "flyer_cache.json NOT created"

      - name: Commit updated data
        run: |
          git config user.name  "events-bot"
          git config user.email "bot@users.noreply.github.com"

          # 1) STAGE + COMMIT the scraper's changes FIRST. (The old order tried to pull
          #    while these were unstaged, which made rebase fail and the push get rejected.)
          git add -A
          git add -f feed_cache/ card_images/ events.json 2>/dev/null || true

          if git diff --staged --quiet; then
            echo "no changes — nothing to commit"
            exit 0
          fi

          git commit -m "refresh: $(date -u +'%Y-%m-%d %H:%M UTC')"

          # 2) Now bring in any commits made on GitHub (e.g. your manual uploads) and
          #    replay our commit on top. -X ours keeps our scraper data on conflicts.
          #    Retry the whole pull+push a few times in case the remote moves again.
          for i in 1 2 3; do
            git pull --rebase -X ours origin main && git push && { echo "pushed ✓"; exit 0; }
            echo "push attempt $i failed — retrying after pulling latest…"
            sleep 3
          done

          echo "ERROR: could not push after 3 attempts"
          exit 1
