# Place this file at:  .github/workflows/refresh.yml
# It runs the scraper every 6 hours, then commits the fresh events.json
# so your raw.githubusercontent.com URL always serves the latest data.

name: Refresh Osho events

on:
  schedule:
    - cron: "0 */6 * * *"    # every 6 hours: 00:00, 06:00, 12:00, 18:00 UTC
  workflow_dispatch: {}        # lets you also run it manually from the Actions tab

permissions:
  contents: write              # needed so the job can commit events.json back

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run scraper
        env:
          APIFY_TOKEN: ${{ secrets.APIFY_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python scraper.py

      - name: Commit updated data
        run: |
          git config user.name  "events-bot"
          git config user.email "bot@users.noreply.github.com"
          git add events.json
          git diff --staged --quiet && echo "no changes — nothing to commit" && exit 0
          git commit -m "refresh: $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push --force-with-lease || (git fetch origin main && git push --force-with-lease)
