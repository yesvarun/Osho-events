<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flyer Splitter — Sannyas Gatherings</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500&display=swap');
  :root { --maroon:#7a1f1f; --gold:#c9a84c; --cream:#fdf6ec; --dark:#1a0f0f; --soft:#f0e6d3; }
  * { box-sizing:border-box; margin:0; padding:0; }
  body { background:var(--cream); color:var(--dark); font-family:'DM Sans',sans-serif; min-height:100vh; }
  header { background:var(--maroon); padding:18px 24px; display:flex; align-items:center; gap:12px; }
  header .lotus { font-size:24px; }
  header h1 { font-family:'Playfair Display',serif; color:var(--cream); font-size:1.2rem; font-weight:400; }
  header .sub { color:var(--gold); font-size:0.7rem; letter-spacing:1px; text-transform:uppercase; display:block; margin-top:2px; }
  header a.back { margin-left:auto; color:var(--gold); font-size:0.78rem; text-decoration:none; border:1px solid rgba(201,168,76,0.4); border-radius:8px; padding:5px 10px; }
  .main { padding:24px 16px 60px; max-width:640px; margin:0 auto; }
  .tip-banner { background:#fff8ee; border:1px solid #f0d898; border-radius:10px; padding:12px 14px; font-size:0.8rem; color:#7a5a1f; margin-bottom:16px; line-height:1.5; }
  .tip-banner strong { color:var(--maroon); }
  .dropzone { border:2px dashed var(--gold); border-radius:16px; background:white; padding:36px 20px; text-align:center; cursor:pointer; transition:background 0.2s; position:relative; }
  .dropzone:hover,.dropzone.drag { background:var(--soft); }
  .dropzone input { position:absolute; inset:0; opacity:0; cursor:pointer; width:100%; }
  .dropzone .icon { font-size:48px; margin-bottom:12px; }
  .dropzone p { color:#666; font-size:0.9rem; }
  .dropzone strong { color:var(--maroon); }
  #preview-wrap { margin-top:16px; display:none; }
  #preview-wrap img { width:100%; border-radius:12px; border:1px solid #ddd; }
  #analyze-btn { display:none; width:100%; margin-top:16px; padding:14px; background:var(--maroon); color:var(--cream); border:none; border-radius:12px; font-family:'Playfair Display',serif; font-size:1.1rem; cursor:pointer; transition:background 0.2s; }
  #analyze-btn:hover { background:#5a1515; }
  #analyze-btn:disabled { background:#aaa; cursor:not-allowed; }
  #status { margin-top:14px; font-size:0.85rem; color:#888; text-align:center; min-height:20px; }
  #cards-section { margin-top:28px; }
  #cards-section h2 { font-family:'Playfair Display',serif; color:var(--maroon); font-size:1.1rem; margin-bottom:16px; padding-bottom:8px; border-bottom:1px solid var(--gold); }
  .event-card { background:white; border-radius:14px; border:1px solid #e8d5b5; overflow:hidden; margin-bottom:20px; box-shadow:0 2px 12px rgba(122,31,31,0.06); }
  .card-header { background:var(--maroon); padding:12px 16px; display:flex; justify-content:space-between; align-items:center; }
  .card-header .month { color:var(--gold); font-size:0.7rem; letter-spacing:2px; text-transform:uppercase; font-weight:500; }
  .card-header .event-num { color:rgba(255,255,255,0.4); font-size:0.75rem; }
  .card-body { padding:14px 16px; }
  .card-body .title { font-family:'Playfair Display',serif; font-size:1rem; color:var(--dark); margin-bottom:4px; }
  .card-body .organiser { font-size:0.8rem; color:#888; margin-bottom:8px; }
  .card-meta { display:flex; flex-direction:column; gap:4px; font-size:0.8rem; color:#555; }
  .flyer-preview-wrap { border-top:1px solid #f0e6d3; padding:12px 16px; background:var(--soft); text-align:center; }
  .flyer-preview-wrap canvas { max-width:100%; border-radius:8px; box-shadow:0 2px 8px rgba(0,0,0,0.1); }
  .flyer-preview-wrap p { font-size:0.72rem; color:#999; margin-top:6px; }
  .card-actions { padding:10px 16px 14px; display:flex; gap:8px; }
  .btn-download { flex:1; padding:10px; background:var(--maroon); color:white; border:none; border-radius:9px; font-size:0.85rem; cursor:pointer; display:flex; align-items:center; justify-content:center; gap:6px; }
  .btn-download:hover { background:#5a1515; }
  .btn-upload { flex:1; padding:10px; background:white; color:var(--maroon); border:2px solid var(--maroon); border-radius:9px; font-size:0.85rem; cursor:pointer; display:flex; align-items:center; justify-content:center; gap:6px; }
  .btn-upload:hover { background:var(--soft); }
  .btn-upload:disabled { opacity:0.6; cursor:default; }
  .spinner { display:inline-block; width:14px; height:14px; border:2px solid rgba(255,255,255,0.3); border-top-color:white; border-radius:50%; animation:spin 0.7s linear infinite; vertical-align:middle; }
  .spinner-dark { border-color:rgba(0,0,0,0.15); border-top-color:#7a1f1f; }
  @keyframes spin { to { transform:rotate(360deg); } }
</style>
</head>
<body>
<header>
  <span class="lotus">🪷</span>
  <div>
    <h1>Flyer Splitter</h1>
    <span class="sub">Sannyas Gatherings</span>
  </div>
  <a class="back" href="index.html">← Directory</a>
</header>

<div class="main">
  <div class="tip-banner">
    Upload one flyer that lists <strong>several camps</strong> and it will be split into a separate card for each event. You can download each card, or add it straight to <strong>oshocamps.com</strong>.
  </div>

  <label class="dropzone" id="dropzone">
    <div class="icon">🖼️</div>
    <p><strong>Tap to choose a flyer</strong><br>or drop an image here</p>
    <input type="file" id="file-input" accept="image/*">
  </label>

  <div id="preview-wrap"><img id="preview-img" alt="flyer preview"></div>
  <button id="analyze-btn">✦ Split into cards</button>
  <div id="status"></div>

  <div id="cards-section"></div>
</div>

<script>
const FN_MULTI = "/.netlify/functions/extract-multi";
const FN_SAVE  = "/.netlify/functions/save-camp";

const fileInput = document.getElementById("file-input");
const dropzone  = document.getElementById("dropzone");
const previewWrap = document.getElementById("preview-wrap");
const previewImg  = document.getElementById("preview-img");
const analyzeBtn  = document.getElementById("analyze-btn");
const statusEl    = document.getElementById("status");
const cardsSection= document.getElementById("cards-section");

let currentFile = null;
let currentB64  = null;
let currentType = "image/jpeg";

function readFile(file){
  currentFile = file;
  currentType = file.type || "image/jpeg";
  const r = new FileReader();
  r.onload = () => {
    previewImg.src = r.result;
    currentB64 = String(r.result).split(",")[1] || "";
    previewWrap.style.display = "block";
    analyzeBtn.style.display = "block";
    statusEl.textContent = "";
    cardsSection.innerHTML = "";
  };
  r.readAsDataURL(file);
}

fileInput.addEventListener("change", e => { if(e.target.files[0]) readFile(e.target.files[0]); });
["dragover","dragenter"].forEach(ev => dropzone.addEventListener(ev, e => { e.preventDefault(); dropzone.classList.add("drag"); }));
["dragleave","drop"].forEach(ev => dropzone.addEventListener(ev, e => { e.preventDefault(); dropzone.classList.remove("drag"); }));
dropzone.addEventListener("drop", e => { const f = e.dataTransfer.files[0]; if(f) readFile(f); });

analyzeBtn.addEventListener("click", async () => {
  if(!currentB64){ statusEl.textContent = "Please choose a flyer first."; return; }
  analyzeBtn.disabled = true;
  analyzeBtn.innerHTML = '<span class="spinner"></span> Reading the flyer…';
  statusEl.textContent = "Looking for camps on the flyer…";
  cardsSection.innerHTML = "";
  try {
    const resp = await fetch(FN_MULTI, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ image_base64: currentB64, media_type: currentType })
    });
    const data = await resp.json();
    const events = (data && Array.isArray(data.events)) ? data.events : [];
    if(!events.length){
      statusEl.textContent = "Couldn't find a clear camp with a date on this flyer. Try a clearer image.";
    } else {
      statusEl.textContent = events.length + (events.length === 1 ? " event found." : " events found.");
      events.forEach((ev, i) => cardsSection.appendChild(buildCard(ev, i, events.length)));
    }
  } catch(e){
    statusEl.textContent = "Sorry — couldn't read the flyer just now. Please try again.";
  } finally {
    analyzeBtn.disabled = false;
    analyzeBtn.innerHTML = "✦ Split into cards";
  }
});

const MONTHS = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
function parseISO(s){ const m = /(\d{4})-(\d{2})-(\d{2})/.exec(s||""); return m ? new Date(+m[1], +m[2]-1, +m[3]) : null; }
function fmtRange(sd, ed){
  const a = parseISO(sd), b = parseISO(ed);
  if(!a) return "Dates to be announced";
  const f = d => d.getDate() + " " + MONTHS[d.getMonth()] + " " + d.getFullYear();
  if(!b || +a === +b) return f(a);
  if(a.getMonth() === b.getMonth() && a.getFullYear() === b.getFullYear())
    return a.getDate() + "–" + b.getDate() + " " + MONTHS[b.getMonth()] + " " + b.getFullYear();
  return f(a) + " – " + f(b);
}
function monthLabel(sd){ const a = parseISO(sd); return a ? MONTHS[a.getMonth()] + " " + a.getFullYear() : "Upcoming"; }

function esc(s){ return String(s==null?"":s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

function buildCard(ev, i, total){
  const card = document.createElement("div");
  card.className = "event-card";
  const place = [ev.venue, ev.city, ev.state || ev.country].filter(Boolean).join(", ");
  card.innerHTML =
    '<div class="card-header"><span class="month">'+esc(monthLabel(ev.start_date))+'</span>'+
      '<span class="event-num">Event '+(i+1)+' of '+total+'</span></div>'+
    (ev.flyer_url ? '<img src="'+esc(ev.flyer_url)+'" alt="" style="width:100%;height:150px;object-fit:cover;display:block">' : '')+
    '<div class="card-body">'+
      '<div class="title">'+esc(ev.title||"Meditation Camp")+'</div>'+
      (ev.organizer ? '<div class="organiser">'+esc(ev.organizer)+'</div>' : '')+
      '<div class="card-meta">'+
        '<span>📅 '+esc(fmtRange(ev.start_date, ev.end_date))+'</span>'+
        (place ? '<span>📍 '+esc(place)+'</span>' : '')+
        (ev.phone ? '<span>📞 '+esc(ev.phone)+'</span>' : '')+
        (ev.type ? '<span>🏷️ '+esc(ev.type)+'</span>' : '')+
      '</div>'+
    '</div>'+
    '<div class="flyer-preview-wrap"><canvas></canvas><p>Shareable card</p></div>'+
    '<div class="card-actions">'+
      '<button class="btn-download">⬇ Download card</button>'+
      '<button class="btn-upload">➕ Add to oshocamps.com</button>'+
    '</div>';

  const canvas = card.querySelector("canvas");
  drawCard(canvas, ev);

  card.querySelector(".btn-download").addEventListener("click", () => {
    const a = document.createElement("a");
    a.download = (ev.title||"camp").replace(/[^a-z0-9]+/gi,"-").toLowerCase().slice(0,40) + ".png";
    a.href = canvas.toDataURL("image/png");
    a.click();
  });

  const upBtn = card.querySelector(".btn-upload");
  upBtn.addEventListener("click", () => addToSite(ev, upBtn));
  return card;
}

function wrapText(ctx, text, x, y, maxW, lh, maxLines){
  const words = String(text||"").split(/\s+/);
  let line = "", lines = [];
  for(const w of words){
    const test = line ? line+" "+w : w;
    if(ctx.measureText(test).width > maxW && line){ lines.push(line); line = w; }
    else line = test;
  }
  if(line) lines.push(line);
  lines = lines.slice(0, maxLines||3);
  lines.forEach((ln, k) => ctx.fillText(ln, x, y + k*lh));
  return y + lines.length*lh;
}

async function drawCard(canvas, ev){
  const W = 800, H = 1000;
  canvas.width = W; canvas.height = H;
  const ctx = canvas.getContext("2d");
  try { if(document.fonts && document.fonts.ready) await document.fonts.ready; } catch(_){}

  // cream background
  ctx.fillStyle = "#fdf6ec"; ctx.fillRect(0,0,W,H);
  // maroon header band
  ctx.fillStyle = "#7a1f1f"; ctx.fillRect(0,0,W,210);
  // gold rule
  ctx.fillStyle = "#c9a84c"; ctx.fillRect(60,250,W-120,3);

  ctx.textAlign = "left";
  ctx.fillStyle = "#c9a84c";
  ctx.font = "500 26px 'DM Sans', sans-serif";
  ctx.fillText("🪷  SANNYAS GATHERINGS", 60, 90);
  ctx.fillStyle = "#fdf6ec";
  ctx.font = "700 34px 'Playfair Display', serif";
  ctx.fillText(monthLabel(ev.start_date).toUpperCase(), 60, 150);

  // title
  ctx.fillStyle = "#1a0f0f";
  ctx.font = "700 48px 'Playfair Display', serif";
  let y = wrapText(ctx, ev.title || "Meditation Camp", 60, 340, W-120, 58, 3);

  // dates
  y += 30;
  ctx.fillStyle = "#7a1f1f";
  ctx.font = "500 30px 'DM Sans', sans-serif";
  ctx.fillText("📅  " + fmtRange(ev.start_date, ev.end_date), 60, y);

  // place
  const place = [ev.venue, ev.city, ev.state || ev.country].filter(Boolean).join(", ");
  if(place){ y += 50; ctx.fillStyle = "#555"; ctx.font = "400 26px 'DM Sans', sans-serif"; y = wrapText(ctx, "📍  "+place, 60, y, W-120, 36, 3); }
  if(ev.organizer){ y += 44; ctx.fillStyle = "#888"; ctx.font = "400 24px 'DM Sans', sans-serif"; ctx.fillText("🧘  "+ev.organizer, 60, y); }
  if(ev.phone){ y += 40; ctx.fillStyle = "#888"; ctx.font = "400 24px 'DM Sans', sans-serif"; ctx.fillText("📞  "+ev.phone, 60, y); }

  // footer
  ctx.fillStyle = "#c9a84c"; ctx.fillRect(60, H-110, W-120, 2);
  ctx.fillStyle = "#7a1f1f"; ctx.font = "italic 400 24px 'Playfair Display', serif";
  ctx.fillText("oshocamps.com", 60, H-60);
}

async function addToSite(ev, btn){
  btn.disabled = true;
  const orig = btn.innerHTML;
  btn.innerHTML = '<span class="spinner spinner-dark"></span> Adding…';
  const camp = {
    id: "split_" + Date.now() + "_" + Math.random().toString(36).slice(2,7),
    title: ev.title || "Meditation Camp",
    type: ev.type || "Camp",
    start_date: ev.start_date || "",
    end_date: ev.end_date || ev.start_date || "",
    venue: ev.venue || "",
    city: ev.city || "",
    state: ev.state || "",
    country: ev.country || "India",
    phone: ev.phone || "",
    flyer_url: ev.flyer_url || "",
    source_url: "",
    source_platform: "Flyer split",
    organizer: ev.organizer || "",
    description: ev.description || "",
    first_seen: new Date().toISOString()
  };
  try {
    const resp = await fetch(FN_SAVE, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ camp })
    });
    if(!resp.ok) throw new Error("save failed");
    btn.innerHTML = "✓ Added";
    btn.style.background = "#edf7ed"; btn.style.color = "#2e7d32"; btn.style.borderColor = "#2e7d32";
  } catch(e){
    btn.innerHTML = "Try again";
    btn.disabled = false;
    setTimeout(() => { btn.innerHTML = orig; }, 2500);
  }
}
</script>
</body>
</html>
