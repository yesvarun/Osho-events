# Pretty share links.
#   oshocamps.com/c/<code>        -> share function, code passed as ?id=<code>
#   oshocamps.com/c?t=..&i=..     -> share function (self-contained fallback)
# (status 200 = rewrite, so the address bar keeps showing /c/<code>)
[[redirects]]
  from = "/c/*"
  to = "/.netlify/functions/share?id=:splat"
  status = 200

[[redirects]]
  from = "/c"
  to = "/.netlify/functions/share"
  status = 200

# Firebase web apiKey is meant to be public, so the secret scanner's hit on it is a
# false alarm — turn the scanner off so deploys publish.
[build.environment]
  SECRETS_SCAN_ENABLED = "false"
